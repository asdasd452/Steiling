<!DOCTYPE html>
<html>
<head>
    <title>Кнопки</title>

    <style>
        body {
            background: #111;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        button {
            padding: 12px 20px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-green {
            background: green;
            color: white;
        }

        .btn-blue {
            background: blue;
            color: white;
        }

        .btn-red {
            background: red;
            color: white;
        }
    </style>
</head>

<body>

<h1>Мои кнопки</h1>

<button class="btn-green" onclick="hello()">Сказать привет</button>
<button class="btn-blue" onclick="goSite()">Открыть сайт</button>
<button class="btn-red" onclick="order()">Заказать</button>

<script>
function hello() {
    alert("Привет 👋");
}

function goSite() {
    window.open("https://google.com");
}

function order() {
    alert("Свяжись со мной!");
}
</script>

</body>
</html>
